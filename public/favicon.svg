<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Green Gradient for the top-left half -->
    <linearGradient id="cyanGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02e0b1" />
      <stop offset="60%" stop-color="#02d5e7" />
      <stop offset="100%" stop-color="#00a8cc" />
    </linearGradient>

    <!-- Deep Blue to Royal Blue Gradient for the bottom-right half -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003cd2" />
      <stop offset="60%" stop-color="#2a62ff" />
      <stop offset="100%" stop-color="#5fa4ff" />
    </linearGradient>

    <!-- Clip Path of the medical cross (plus sign) with rounded corners -->
    <clipPath id="crossClip">
      <!-- Vertical bar -->
      <rect x="170" y="20" width="172" height="472" rx="86" />
      <!-- Horizontal bar -->
      <rect x="20" y="170" width="472" height="172" rx="86" />
    </clipPath>

    <!-- Soft premium shadow for the swoosh -->
    <filter id="swooshShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="6" stdDeviation="8" flood-color="#000e30" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Ground Shadow under the entire cross to give it depth -->
  <g filter="blur(10px)" opacity="0.15">
    <rect x="180" y="30" width="172" height="472" rx="86" fill="#000000" />
    <rect x="30" y="180" width="472" height="172" rx="86" fill="#000000" />
  </g>

  <!-- 1. Background Fill: Blue Gradient for the entire cross -->
  <rect x="0" y="0" width="512" height="512" fill="url(#blueGrad)" clip-path="url(#crossClip)" />

  <!-- 2. Top-Left Overlay: Cyan/Green Gradient covering the upper-left half -->
  <path d="M 0 0 L 512 0 L 512 165 Q 256 256 15 342 L 0 342 Z" fill="url(#cyanGreenGrad)" clip-path="url(#crossClip)" />

  <!-- 3. Elegant dividing white swoosh (curved 3D ribbon) with shadow -->
  <path d="M -10 354 Q 256 256 522 158" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="26" 
        stroke-linecap="round" 
        filter="url(#swooshShadow)"
        clip-path="url(#crossClip)" />

  <!-- Overlying crisp white line on top to keep it perfectly clean without shadow bleed -->
  <path d="M -10 354 Q 256 256 522 158" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="24" 
        stroke-linecap="round" 
        clip-path="url(#crossClip)" />
</svg>
